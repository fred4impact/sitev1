# Dev-only values for local kind testing.
# STRIPE_*/RESEND_API_KEY are left blank on purpose: the backend already
# auto-completes orders and log-skips confirmation emails when these are
# unset (see backend/orders/services.py and backend/orders/emails.py), so
# the full checkout/ticketing flow is testable without real keys. Fill
# these in (and update DEFAULT_FROM_EMAIL) to test live payments/emails.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
type: Opaque
stringData:
  DJANGO_SECRET_KEY: dev-only-secret-change-me
  DATABASE_URL: postgres://songroom:songroom@postgres.songroom.svc.cluster.local:5432/songroom
  STRIPE_SECRET_KEY: ""
  STRIPE_PUBLISHABLE_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  RESEND_API_KEY: ""
  DEFAULT_FROM_EMAIL: "The Songroom Sessions <onboarding@resend.dev>"
